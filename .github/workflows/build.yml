name: Stasis Build

permissions:
  contents: read

on: [push, pull_request]

jobs:
  assets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Python 3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.14'

      - name: Verify Assets
        run: |
          ./assets/refresh_assets.py --verify

  scala:
    needs:
      - assets

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 25
          distribution: adopt
          cache: sbt

      - name: Setup SBT
        uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41

      - name: Run QA
        run: |
          mkdir ${{ github.workspace }}/target
          sbt qa

      - name: Push Coverage Result
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          flags: scala
          token: ${{ secrets.CODECOV_TOKEN }}

  python:
    needs:
      - assets

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Python 3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.14'

      - name: Run QA
        run: |
          cd client-cli
          pip install -e .
          pip install coverage pylint
          ./qa.py
          python -m coverage xml

      - name: Push Coverage Result
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          flags: python
          token: ${{ secrets.CODECOV_TOKEN }}

  flutter-linux:
    needs:
      - assets

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'
      - name: Run identity-ui QA
        run: |
          sudo apt update -y
          sudo apt install -y lcov
          cd identity-ui
          ./qa.py
      - name: Run server-ui QA
        run: |
          sudo apt update -y
          sudo apt install -y lcov
          cd server-ui
          ./qa.py
      - name: Run client-ui QA
        run: |
          sudo apt update -y
          sudo apt install -y lcov ninja-build libgtk-3-dev
          cd client-ui
          ./qa.py

  flutter-macos:
    needs:
      - assets

    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'
          architecture: x64
      - name: Run client-ui QA
        run: |
          cd client-ui
          brew install lcov
          ./qa.py

  android:
    needs:
      - assets

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 21
          distribution: adopt

      - name: Run QA
        run: |
          cd client-android
          ./gradlew qa
