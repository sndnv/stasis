name: Stasis Publish (Release)

permissions:
  contents: read
  packages: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/sndnv/stasis

jobs:
  scala:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Log into registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 25
          distribution: adopt
          cache: sbt

      - name: Setup SBT
        uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41

      - name: Setup Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Stage identity image
        id: stage-identity
        run: |
          sbt identity/docker:stage
          NAME=$(sbt -no-colors --error "project identity" "print packageName")
          VERSION=$(sbt -no-colors --error "project identity" "print version")
          TAG="${REGISTRY}/${NAME}:${VERSION}"
          echo "Staged [${TAG}] for [identity]"
          echo "IDENTITY_TAG=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Stage server image
        id: stage-server
        run: |
          sbt server/docker:stage
          NAME=$(sbt -no-colors --error "project server" "print packageName")
          VERSION=$(sbt -no-colors --error "project server" "print version")
          TAG="${REGISTRY}/${NAME}:${VERSION}"
          echo "Staged [${TAG}] for [server]"
          echo "SERVER_TAG=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push identity image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        env:
          IDENTITY_TAG: ${{ steps.stage-identity.outputs.IDENTITY_TAG }}
        with:
          context: ./identity/target/docker/stage
          file: ./identity/target/docker/stage/Dockerfile
          push: true
          tags: |
            ${{env.IDENTITY_TAG}}
          platforms: linux/amd64,linux/arm64

      - name: Build and push server image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        env:
          SERVER_TAG: ${{ steps.stage-server.outputs.SERVER_TAG }}
        with:
          context: ./server/target/docker/stage
          file: ./server/target/docker/stage/Dockerfile
          push: true
          tags: |
            ${{env.SERVER_TAG}}
          platforms: linux/amd64,linux/arm64

      - name: Build client artifacts
        run: |
          sbt "project client" universal:packageBin
          mv client/target/universal/stasis-client-*.zip client/target/universal/stasis-client-${{ github.ref_name }}.zip

      - name: Upload client artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: client
          path: client/target/universal/stasis-client-${{ github.ref_name }}.zip
          if-no-files-found: error
          retention-days: 1

      - name: Build deployment artifacts
        run: |
          git archive -o stasis-deployment-${{ github.ref_name }}.tar.gz --format tar.gz ${{ github.ref_name }}:deployment/production

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: deployment
          path: stasis-deployment-${{ github.ref_name }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Python 3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.14'

      - name: Build client-cli artifacts
        run: |
          cd client-cli
          pip install wheel setuptools
          python setup.py bdist_wheel
          mv dist/stasis_client_cli-*-py3-none-any.whl dist/stasis_client_cli-${{ github.ref_name }}-py3-none-any.whl

      - name: Upload client-cli artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: client-cli
          path: client-cli/dist/stasis_client_cli-${{ github.ref_name }}-py3-none-any.whl
          if-no-files-found: error
          retention-days: 1

  flutter-docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Log into registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Stage identity-ui
        id: stage-identity-ui
        run: |
          cd identity-ui
          TAG=$(./deployment/production/stage.py | tail -1)
          echo "Staged [${TAG}] for [identity-ui]"
          echo "IDENTITY_UI_TAG=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Stage server-ui
        id: stage-server-ui
        run: |
          cd server-ui
          TAG=$(./deployment/production/stage.py | tail -1)
          echo "Staged [${TAG}] for [server-ui]"
          echo "SERVER_UI_TAG=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push identity-ui image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        env:
          IDENTITY_UI_TAG: ${{ steps.stage-identity-ui.outputs.IDENTITY_UI_TAG }}
        with:
          context: ./identity-ui
          file: ./identity-ui/deployment/production//Dockerfile
          push: true
          tags: |
            ${{env.IDENTITY_UI_TAG}}
          platforms: linux/amd64,linux/arm64

      - name: Build and push server-ui image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        env:
          SERVER_UI_TAG: ${{ steps.stage-server-ui.outputs.SERVER_UI_TAG }}
        with:
          context: ./server-ui
          file: ./server-ui/deployment/production//Dockerfile
          push: true
          tags: |
            ${{env.SERVER_UI_TAG}}
          platforms: linux/amd64,linux/arm64

  flutter-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'

      - name: Setup Python 3
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.14'

      - name: Build client-ui Linux artifacts
        run: |
          sudo apt update -y
          sudo apt install -y ninja-build libgtk-3-dev
          cd client-ui
          flutter pub get
          dart run build_runner build
          flutter build linux

      - name: Build client-ui AppImage
        run: |
          pip install git+https://github.com/AppImageCrafters/appimage-builder.git@42d32f11496de43a9f6a9ada7882a11296e357ca
          cd client-ui
          appimage-builder --skip-test
          mv *.AppImage stasis-client-ui-linux-${{ github.ref_name }}.AppImage

      - name: Upload client-ui Linux artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: client-ui-linux
          path: client-ui/stasis-client-ui-linux-${{ github.ref_name }}.AppImage
          if-no-files-found: error
          retention-days: 1

  flutter-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: 'stable'
          architecture: x64
      - name: Build client-ui MacOS artifacts
        run: |
          brew install create-dmg
          cd client-ui
          flutter pub get
          dart run build_runner build
          flutter build macos
          create-dmg \
            --volname "stasis" \
            --window-size 800 400 \
            --app-drop-link 600 200 \
            "stasis-client-ui-macos-${{ github.ref_name }}.dmg" "build/macos/Build/Products/Release/stasis.app/"

      - name: Upload client-ui MacOS artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: client-ui-macos
          path: client-ui/stasis-client-ui-macos-${{ github.ref_name }}.dmg
          if-no-files-found: error
          retention-days: 1

  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 21
          distribution: adopt

      - name: Decode Keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@784a1a4a994315802b7d8e2084e116e783d157be
        with:
          fileName: 'signing.jks'
          fileDir: './client-android/app/secrets/'
          encodedString: ${{ secrets.ANDROID_SIGNING_KEYSTORE }}

      - name: Build client-android artifacts
        env:
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
          ANDROID_SIGNING_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEYSTORE_PASSWORD }}
        run: |
          cd client-android
          ./gradlew :app:assembleRelease -x test
          mv app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/stasis-client-android-${{ github.ref_name }}.apk

      - name: Upload client-android artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: client-android
          path: client-android/app/build/outputs/apk/release/stasis-client-android-${{ github.ref_name }}.apk
          if-no-files-found: error
          retention-days: 1

  release:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    needs:
      - scala
      - python
      - flutter-docker
      - flutter-linux
      - flutter-macos
      - android

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c

      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          fail_on_unmatched_files: true
          files: |
            client/stasis-client-${{ github.ref_name }}.zip
            client-cli/stasis_client_cli-${{ github.ref_name }}-py3-none-any.whl
            client-ui-linux/stasis-client-ui-linux-${{ github.ref_name }}.AppImage
            client-ui-macos/stasis-client-ui-macos-${{ github.ref_name }}.dmg
            client-android/stasis-client-android-${{ github.ref_name }}.apk
            deployment/stasis-deployment-${{ github.ref_name }}.tar.gz
