name: server_ui
description: Web-based user interface for the `server` service.
version: 1.7.3

publish_to: 'none'

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  http: ^1.6.0
  oauth2: ^2.0.5
  url_launcher: ^6.3.2
  fluro: ^2.0.5
  url_strategy: ^0.3.0
  shared_preferences: ^2.5.4
  flutter_svg: ^2.2.4
  flutter_dotenv: ^6.0.0
  data_table_2: ^2.7.2
  intl: ^0.20.2
  multi_select_flutter: ^4.1.3
  cryptography: ^2.9.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  mockito: ^5.6.3

flutter:
  uses-material-design: true
